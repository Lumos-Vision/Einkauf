<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Markt Pilot</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #e63946;
    --accent2: #f4a261;
    --text: #f1faee;
    --text-muted: #8888aa;
    --border: #2e2e50;
    --green: #52b788;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }

  /* NAV TABS */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  nav button {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* VIEWS */
  .view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .view.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* INPUT ROW */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:active { transform: scale(0.97); background: #c1121f; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:active { background: var(--surface2); }
  .btn-green { background: var(--green); color: #0f1f14; }
  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

  /* ITEM LIST */
  .item-list { list-style: none; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  .item-row:last-child { border-bottom: none; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-name {
    flex: 1;
    font-size: 0.95rem;
  }
  .item-name.done {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .zone-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--accent); }

  /* CHECK */
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-btn.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .check-btn.checked::after { content: '\u2713'; color: white; font-size: 0.7rem; font-weight: bold; }

  /* ZONE EDITOR */
  .zone-list { list-style: none; }
  .zone-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .zone-row:last-child { border-bottom: none; }
  .zone-color {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .zone-name-text { flex: 1; font-size: 0.9rem; }
  .zone-order {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3
