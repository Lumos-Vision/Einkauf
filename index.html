<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Markt Pilot</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #e63946;
    --accent2: #f4a261;
    --text: #f1faee;
    --text-muted: #8888aa;
    --border: #2e2e50;
    --green: #52b788;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }

  /* NAV TABS */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  nav button {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* VIEWS */
  .view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .view.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* INPUT ROW */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }

  /* BUTTONS */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 12px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:active { transform: scale(0.97); background: #c1121f; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:active { background: var(--surface2); }
  .btn-green { background: var(--green); color: #0f1f14; }
  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

  /* ITEM LIST */
  .item-list { list-style: none; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  .item-row:last-child { border-bottom: none; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-name {
    flex: 1;
    font-size: 0.95rem;
  }
  .item-name.done {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .zone-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--accent); }

  /* CHECK */
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-btn.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .check-btn.checked::after { content: '✓'; color: white; font-size: 0.7rem; font-weight: bold; }

  /* ZONE EDITOR */
  .zone-list { list-style: none; }
  .zone-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .zone-row:last-child { border-bottom: none; }
  .zone-color {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .zone-name-text { flex: 1; font-size: 0.9rem; }
  .zone-order {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
  }
  .move-btns { display: flex; gap: 4px; }
  .move-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* ROUTE VIEW */
  .route-step {
    display: flex;
    gap: 14px;
    margin-bottom: 8px;
    animation: slideIn 0.25s ease;
  }
  .step-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .step-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .step-connector {
    width: 2px;
    flex: 1;
    background: var(--border);
    min-height: 16px;
  }
  .step-content { flex: 1; padding-bottom: 12px; }
  .step-zone {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .step-items { display: flex; flex-direction: column; gap: 4px; }
  .step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* COUNT BADGE */
  .count-badge {
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 2px 7px;
    font-family: 'Space Mono', monospace;
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .flex-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .gap-8 { gap: 8px; }
  .mb-16 { margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <h1>Markt<span>Pilot</span></h1>
  <span id="itemCountBadge" class="count-badge" style="display:none">0</span>
</header>

<nav>
  <button class="active" onclick="showView('list')">📋 Liste</button>
  <button onclick="showView('route')">🗺️ Route</button>
  <button onclick="showView('zones')">🏪 Zonen</button>
</nav>

<!-- LIST VIEW -->
<div id="view-list" class="view active">
  <div class="input-row" style="margin-top:4px">
    <input type="text" id="itemInput" placeholder="Artikel hinzufügen..." onkeydown="if(event.key==='Enter')addItem()">
    <select id="zoneSelect"></select>
    <button class="btn btn-primary" onclick="addItem()">+</button>
  </div>
  <div class="card" id="listCard">
    <div class="section-title">Einkaufsliste</div>
    <ul class="item-list" id="itemList"></ul>
    <div class="empty" id="listEmpty">
      <div class="icon">🛒</div>
      Noch keine Artikel.<br>Füge oben etwas hinzu.
    </div>
  </div>
  <button class="btn btn-ghost" style="width:100%;margin-top:4px" onclick="clearChecked()">✓ Erledigte entfernen</button>
</div>

<!-- ROUTE VIEW -->
<div id="view-route" class="view">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="routeContent"></div>
</div>

<!-- ZONES VIEW -->
<div id="view-zones" class="view">
  <div class="card mb-16">
    <div class="section-title">Neue Zone</div>
    <div class="input-row" style="margin-bottom:0">
      <input type="text" id="zoneInput" placeholder="z.B. Obst & Gemüse" onkeydown="if(event.key==='Enter')addZone()">
      <button class="btn btn-primary" onclick="addZone()">+</button>
    </div>
  </div>
  <div class="card">
    <div class="flex-between">
      <div class="section-title" style="margin-bottom:0">Reihenfolge im Markt</div>
    </div>
    <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px">Sortiere Zonen in der Reihenfolge, wie du durch den Markt läufst.</p>
    <ul class="zone-list" id="zoneList"></ul>
    <div class="empty" id="zonesEmpty">
      <div class="icon">🏪</div>
      Keine Zonen angelegt.<br>Erstelle zuerst deine Marktzonen.
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────
const COLORS = ['#e63946','#f4a261','#2a9d8f','#457b9d','#a8dadc','#e9c46a','#52b788','#c77dff','#f72585','#4cc9f0'];

let state = {
  items: [],    // {id, name, zoneId, done}
  zones: [],    // {id, name, order, color}
};

function save() { localStorage.setItem('marktpilot', JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem('marktpilot');
  if (raw) state = JSON.parse(raw);
  if (!state.zones || state.zones.length === 0) {
    state.zones = [
      {id:'z1', name:'Eingang / Aktionen', order:0, color:COLORS[0]},
      {id:'z2', name:'Obst & Gemüse', order:1, color:COLORS[2]},
      {id:'z3', name:'Brot & Backwaren', order:2, color:COLORS[5]},
      {id:'z4', name:'Trockenware', order:3, color:COLORS[3]},
      {id:'z5', name:'Kühlregal', order:4, color:COLORS[6]},
      {id:'z6', name:'Tiefkühl', order:5, color:COLORS[8]},
      {id:'z7', name:'Getränke', order:6, color:COLORS[1]},
      {id:'z8', name:'Kasse', order:7, color:COLORS[9]},
    ];
    save();
  }
}

// ── VIEWS ──────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'route') renderRoute();
  if (name === 'list') renderList();
  if (name === 'zones') renderZones();
}

// ── LIST ───────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('itemList');
  const empty = document.getElementById('listEmpty');
  const sel = document.getElementById('zoneSelect');
  const badge = document.getElementById('itemCountBadge');

  // Zone select
  sel.innerHTML = state.zones
    .slice().sort((a,b)=>a.order-b.order)
    .map(z => `<option value="${z.id}">${z.name}</option>`).join('');

  // Items
  const undone = state.items.filter(i => !i.done);
  const done = state.items.filter(i => i.done);
  const sorted = [...undone, ...done];

  list.innerHTML = '';
  if (sorted.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  sorted.forEach(item => {
    const zone = state.zones.find(z => z.id === item.zoneId);
    const li = document.createElement('li');
    li.className = 'item-row';
    li.innerHTML = `
      <button class="check-btn ${item.done?'checked':''}" onclick="toggleItem('${item.id}')"></button>
      <span class="item-name ${item.done?'done':''}">${item.name}</span>
      ${zone ? `<span class="zone-badge" style="border-color:${zone.color};color:${zone.color}">${zone.name}</span>` : ''}
      <button class="del-btn" onclick="deleteItem('${item.id}')">×</button>
    `;
    list.appendChild(li);
  });

  // Badge
  const count = undone.length;
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline' : 'none';
}

function addItem() {
  const input = document.getElementById('itemInput');
  const sel = document.getElementById('zoneSelect');
  const name = input.value.trim();
  if (!name) return;
  state.items.push({ id: Date.now().toString(), name, zoneId: sel.value, done: false });
  save(); renderList();
  input.value = '';
  input.focus();
  showToast('Hinzugefügt ✓');
}

function deleteItem(id) {
  state.items = state.items.filter(i => i.id !== id);
  save(); renderList();
}

function toggleItem(id) {
  const item = state.items.find(i => i.id === id);
  if (item) item.done = !item.done;
  save(); renderList();
  updateProgress();
}

function clearChecked() {
  state.items = state.items.filter(i => !i.done);
  save(); renderList();
  showToast('Erledigte entfernt');
}

// ── ROUTE ──────────────────────────────────────────────
function renderRoute() {
  const container = document.getElementById('routeContent');
  const fill = document.getElementById('progressFill');

  const undone = state.items.filter(i => !i.done);
  const total = state.items.length;
  const doneCount = state.items.filter(i => i.done).length;

  fill.style.width = total > 0 ? (doneCount / total * 100) + '%' : '0%';

  if (undone.length === 0 && total === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">🗺️</div>Keine Artikel auf der Liste.<br>Füge zuerst etwas hinzu.</div>`;
    return;
  }
  if (undone.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">🎉</div>Alles erledigt!<br>Guten Einkauf.</div>`;
    return;
  }

  // Group by zone, sorted by zone order
  const sortedZones = state.zones.slice().sort((a,b) => a.order - b.order);
  const groups = [];
  sortedZones.forEach(zone => {
    const zoneItems = undone.filter(i => i.zoneId === zone.id);
    if (zoneItems.length > 0) groups.push({ zone, items: zoneItems });
  });
  // Items without zone
  const noZone = undone.filter(i => !state.zones.find(z => z.id === i.zoneId));
  if (noZone.length > 0) groups.push({ zone: { name: 'Ohne Zone', color: '#888' }, items: noZone });

  container.innerHTML = groups.map((g, idx) => `
    <div class="route-step">
      <div class="step-line">
        <div class="step-dot" style="background:${g.zone.color}"></div>
        ${idx < groups.length - 1 ? '<div class="step-connector"></div>' : ''}
      </div>
      <div class="step-content">
        <div class="step-zone" style="color:${g.zone.color}">${g.zone.name}</div>
        <div class="step-items">
          ${g.items.map(item => `
            <div class="step-item">
              <button class="check-btn ${item.done?'checked':''}" onclick="toggleItemRoute('${item.id}')"></button>
              <span class="${item.done?'done':''}">${item.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleItemRoute(id) {
  const item = state.items.find(i => i.id === id);
  if (item) item.done = !item.done;
  save(); renderRoute();
}

function updateProgress() {
  const total = state.items.length;
  const done = state.items.filter(i => i.done).length;
  document.getElementById('progressFill').style.width = total > 0 ? (done/total*100)+'%' : '0%';
}

// ── ZONES ──────────────────────────────────────────────
function renderZones() {
  const list = document.getElementById('zoneList');
  const empty = document.getElementById('zonesEmpty');
  const sorted = state.zones.slice().sort((a,b) => a.order - b.order);

  if (sorted.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = sorted.map((z, idx) => `
    <li class="zone-row">
      <div class="zone-color" style="background:${z.color}"></div>
      <span class="zone-name-text">${z.name}</span>
      <span class="zone-order">#${idx+1}</span>
      <div class="move-btns">
        <button class="move-btn" onclick="moveZone('${z.id}',-1)" ${idx===0?'disabled style="opacity:0.3"':''}>↑</button>
        <button class="move-btn" onclick="moveZone('${z.id}',1)" ${idx===sorted.length-1?'disabled style="opacity:0.3"':''}>↓</button>
      </div>
      <button class="del-btn" onclick="deleteZone('${z.id}')">×</button>
    </li>
  `).join('');
}

function addZone() {
  const input = document.getElementById('zoneInput');
  const name = input.value.trim();
  if (!name) return;
  const color = COLORS[state.zones.length % COLORS.length];
  const maxOrder = state.zones.reduce((m, z) => Math.max(m, z.order), -1);
  state.zones.push({ id: 'z' + Date.now(), name, order: maxOrder + 1, color });
  save(); renderZones();
  input.value = '';
  showToast('Zone erstellt');
}

function deleteZone(id) {
  state.zones = state.zones.filter(z => z.id !== id);
  // Reassign order
  state.zones.slice().sort((a,b)=>a.order-b.order).forEach((z,i) => z.order = i);
  save(); renderZones();
}

function moveZone(id, dir) {
  const sorted = state.zones.slice().sort((a,b) => a.order - b.order);
  const idx = sorted.findIndex(z => z.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const tmp = sorted[idx].order;
  sorted[idx].order = sorted[swapIdx].order;
  sorted[swapIdx].order = tmp;
  save(); renderZones();
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── INIT ───────────────────────────────────────────────
load();
renderList();
</script>
</body>
</html>
